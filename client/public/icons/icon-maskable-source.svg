<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="55%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background (no rounded corners — OS provides the shape) -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>

  <!-- Inner safe zone: center 320x320 area (~62%) -->
  <g transform="translate(96, 96)">
    <g fill="#ffffff" font-family="Inter, -apple-system, system-ui, sans-serif" font-weight="800">
      <text x="160" y="208" text-anchor="middle" font-size="180" letter-spacing="-6">FX</text>
    </g>
    <g stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85">
      <polyline points="40,270 110,235 180,270 270,180"/>
    </g>
  </g>
</svg>
